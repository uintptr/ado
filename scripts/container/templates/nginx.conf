server {
        listen 80;
        http2 on;
        server_name __DOMAIN_NAME__ www.__DOMAIN_NAME__;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header 'Access-Control-Allow-Origin' '*' always;

        # Performance Settings
        gzip on;
        gzip_vary on;
        gzip_min_length 1000;
        gzip_types
                text/plain
                text/css
                application/json
                application/javascript
                text/xml
                application/xml
                application/xml+rss
                text/javascript
                application/wasm;

        keepalive_timeout 65;
        client_max_body_size 10M;

        location "/search" {
                rewrite ^/search$ /index.html?$args last;
        }

        location "/" {
                root /var/www/;
                index index.html index.htm;
                try_files $uri $uri/ =404;
        }

        location "/google/" {
                proxy_pass https://www.googleapis.com/;
                proxy_ssl_server_name on;
                access_log off;
                error_log /dev/null crit;
                proxy_set_header Host www.googleapis.com;
                proxy_set_header Referer "";
                proxy_set_header Origin "";
                expires 10m;
                add_header Cache-Control "public, max-age=600";
        }

        location "/serpapi/" {
                proxy_pass https://www.serpapi.com/;
                proxy_ssl_server_name on;
                access_log off;
                error_log /dev/null crit;
                proxy_set_header Host www.serpapi.com;
                proxy_set_header Referer "";
                proxy_set_header Origin "";
                expires 10m;
                add_header Cache-Control "public, max-age=600";
        }

        location "/anthropic/" {
                proxy_pass https://api.anthropic.com/;
                proxy_ssl_server_name on;
                access_log off;
                error_log /dev/null crit;
                proxy_set_header Host api.anthropic.com;
                proxy_set_header Referer "";
                proxy_set_header Origin "";
                expires 10m;
                add_header Cache-Control "public, max-age=600";
        }

        location "/webdis/" {
                proxy_pass http://webdis:7379/;
                access_log off;
                error_log /dev/null crit;
                proxy_set_header Referer "";
        }
}
