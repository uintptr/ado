name: Build

on:
    push:
        tags: ["*"]
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-musl
                      artifact_suffix: linux-amd64
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      artifact_suffix: darwin-amd64
                      is_mac: true
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact_suffix: darwin-arm64
                      is_mac: true
        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust target
              run: rustup target add ${{ matrix.target }}

            - name: Install Linux musl tools
              if: matrix.target == 'x86_64-unknown-linux-musl'
              run: sudo apt-get update && sudo apt-get install -y musl-tools

            - name: Build
              run: cargo build --release --target ${{ matrix.target }}

            - name: Run tests
              if: matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
              run: cargo test --release --target ${{ matrix.target }}

            - name: Check formatting
              run: cargo fmt --all -- --check

            - name: Run clippy
              run: cargo clippy --no-deps --all-targets --all-features -- -D warnings

            - name: Rename binary for release
              if: startsWith(github.ref, 'refs/tags/') && !matrix.is_mac
              run: cp target/${{ matrix.target }}/release/ado target/${{ matrix.target }}/release/ado-${{ matrix.artifact_suffix }}

            - name: Upload release binary
              if: startsWith(github.ref, 'refs/tags/') && !matrix.is_mac
              uses: actions/upload-artifact@v4
              with:
                  name: binaries-${{ matrix.artifact_suffix }}
                  path: target/${{ matrix.target }}/release/ado-${{ matrix.artifact_suffix }}

            - name: Upload macOS binary for lipo
              if: startsWith(github.ref, 'refs/tags/') && matrix.is_mac
              uses: actions/upload-artifact@v4
              with:
                  name: macos-${{ matrix.target }}
                  path: target/${{ matrix.target }}/release/ado

    universal-macos:
        needs: build
        runs-on: macos-latest
        if: startsWith(github.ref, 'refs/tags/')

        steps:
            - name: Download x86_64 binary
              uses: actions/download-artifact@v4
              with:
                  name: macos-x86_64-apple-darwin
                  path: x86_64

            - name: Download arm64 binary
              uses: actions/download-artifact@v4
              with:
                  name: macos-aarch64-apple-darwin
                  path: arm64

            - name: Create universal binary with lipo
              run: lipo -create x86_64/ado arm64/ado -output ado-darwin

            - name: Upload universal binary
              uses: actions/upload-artifact@v4
              with:
                  name: binaries-darwin
                  path: ado-darwin

    release:
        needs: [build, universal-macos]
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')
        permissions:
            contents: write

        steps:
            - name: Download release artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: binaries-*
                  path: artifacts

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: artifacts/**/*
                  generate_release_notes: true
